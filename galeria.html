<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <link rel="shortcut icon" href="img/logo2.png" type="image/x-icon">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!--FONT AWESOME-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <title>Galeria | KVELVET</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            padding-top: 200px;
            font-family: "Poppins",sans-serif;
            background-image: none;
            background: white;
        }
        header{
            background: black;
            padding: 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            text-align: center;
        }
        .activo{
            border-bottom: 2px solid #d89a8d;
        }
        h1{
            color: white;
            text-align: center;
            margin-bottom: 15px;
            display: inline-block;
            transition: 0.3s;
        }
        h1:hover{
            opacity: 0.6;
        }
        .web{
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
        }
        .web a{
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .galeria-contenedor{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1000px;
            margin: 40px auto
        }
        .foto-galeria{
            width: 280px;
            text-align: center;
        }
        .foto-galeria img{
            width: 100%;
            height: 180px;
            object-fit: cover;
            box-shadow: 0px 12px 20px;
            opacity: 0.6;
            transition: 0.4 ease;
        }
        .foto-galeria img:hover{
            opacity: 1;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0px 18px 28px;
        }
        .foto-galeria p{
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #333;
            margin-top: 12px;
            text-align: center;
        }
         footer{
            background: black;
            padding: 10px;
            margin-top: 40px;
        }
        .redes{
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
            padding: 0;
            width: 100%;
            transform: translateY(-15px);
        }
        .redes a{
            color: white;
            font-size: 25px;
        }
        footer .redes a{
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        footer .redes a:hover{
            opacity: 0.9;
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.15);
        }
        
    </style>
</head>
<body>
    <!-- Activar audio al hacer clic -->
    <audio autoplay loop muted id="musica">
    <source src="audio/Birdie in the Sand.mp3" type="audio/mpeg">
</audio>
        <header>
            <nav class="menu">
                <h1>KVELVET</h1>
                <ul class="web">
                  <li><a href="index.html">
                    <i class="fa-solid fa-house"></i>INICIO</a></li>
                    <li><a href="nosotros.html"><i class="fa-regular fa-gem"></i>NOSOTROS</a></li>
                  <li><a href="blog.html">
                    <i class="fa-solid fa-feather-pointed"></i>BLOG</a></li>
                  <li><a class="activo" href="galeria.html">
                    <i class="fa-regular fa-image"></i>GALERÍA</a></li>
                  <li><a href="videos.html">
                    <i class="fa-solid fa-play"></i>VÍDEOS</a></li>
                    <li><a href="contactos.html"><i class="fa-regular fa-envelope"></i>CONTACTOS</a></li>
                    <li><a href="promociones.html"><i class="fa-solid fa-tag"></i>PROMOCIONES</a></li>
                    <li><a href="combos.html"><i class="fa-solid fa-layer-group"></i>COMBOS</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="galeria-contenedor">
                <div class="foto-galeria">
                    <img src="img/modelo1.jpg" alt="modelo 1">
                    <p>Imagen 1</p>
                </div>

                <div class="foto-galeria">
                    <img src="img/modelo2.jpg" alt="modelo 2">
                    <p>Imagen 2</p>
                </div>

                <div class="foto-galeria">
                    <img src="img/modelo3.jpg" alt="modelo 3">
                    <p>Imagen 3</p>
                </div>

                <div class="foto-galeria">
                    <img src="img/modelo4.jpg" alt="modelo 4">
                    <p>Imagen 4</p>
                </div>

                <div class="foto-galeria">
                    <img src="img/modelo5.jpg" alt="modelo 5">
                    <p>Imagen 5</p>
                </div>

                <div class="foto-galeria">
                    <img src="img/modelo6.jpg" alt="modelo 6">
                    <p>Imagen 6</p>
                </div>
        </main>
        <footer>
            <div class="redes">
                <a href="https://www.x.com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.tiktok.com" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            </div>
        </footer>
    <script>
    const musica = document.getElementById("musica");

    window.addEventListener("click", () => {
        musica.muted = false;
        musica.play();
    });
</script>
</body>
</html>
